spring.application.name=nasa-telegram-bot
# Let Render set the port dynamically
server.port=${PORT:8080}

# Use environment variables (Render will provide these)
nasa.api.key=${NASA_API_KEY:DEMO_KEY}
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}

# Production settings
spring.profiles.active=production
logging.level.com.nasa=INFO
logging.level.org.telegram=INFO